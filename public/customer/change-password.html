<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>修改密码 - 咖啡会员</title>
  <link rel="stylesheet" href="css/customer.css">
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div>
        <button class="back-btn" onclick="window.location.href='/h5/customer/cards.html'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span style="font-size:18px;font-weight:700">修改密码</span>
      </div>
    </div>
  </div>

  <div style="margin: 24px 16px; background: var(--card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius); padding: 32px 24px; box-shadow: var(--card-shadow);">
    <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 24px; color: var(--text);">账号安全</h3>
    <form id="changePwdForm">
      <div class="form-group">
        <label>原密码</label>
        <input type="password" id="oldPassword" placeholder="请输入原密码" required>
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPassword" placeholder="至少6位" minlength="6" required>
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入新密码" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary" id="changePwdBtn" style="margin-top: 32px;">确认修改</button>
    </form>
  </div>

  <script src="js/auth.js"></script>
  <script>
    if (!requireAuth()) { /* redirect */ }

    const changePwdForm = document.getElementById('changePwdForm');
    changePwdForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('changePwdBtn');

      if (newPassword.length < 6) {
        alert('新密码至少6位');
        return;
      }

      if (newPassword !== confirmPassword) {
        alert('两次输入的新密码不一致');
        return;
      }

      btn.disabled = true;
      btn.textContent = '修改中...';

      try {
        await apiRequest('/customer/change-password', {
          method: 'POST',
          body: JSON.stringify({ oldPassword, newPassword }),
        });
        alert('密码修改成功，请重新登录');
        clearAuth();
        window.location.href = '/h5/customer/login.html';
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '确认修改';
      }
    });
  </script>
</body>
</html>
