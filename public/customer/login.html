<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - 咖啡会员</title>
  <link rel="stylesheet" href="css/customer.css">
</head>
<body>
  <div class="login-page">
    <div class="login-hero">
      <div class="logo-area">
        <span class="logo-icon">☕</span>
        <h1 class="logo-text">觅舍咖啡</h1>
      </div>
      <h2 class="hero-slogan">每一杯，<br>皆为不凡。</h2>
      <p class="hero-sub">Savor Every Moment</p>
    </div>
    <div class="login-panel">
      <div class="panel-header">
        <h3>欢迎回来</h3>
        <p>登录查看您的会员卡</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>手机号</label>
          <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="rememberPwd">
            <span class="checkmark"></span>
            <span>记住密码</span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
